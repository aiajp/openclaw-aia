name: "Scrum: Auto Review Request"
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  notify-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number from branch
        id: issue
        run: |
          BRANCH="${{ github.head_ref }}"
          ISSUE_NUM=$(echo "$BRANCH" | grep -oP '\d+' | head -1)
          echo "number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Notify OpenClaw via Slack
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"#claw\", \"text\": \"🔍 Auto Review requested: PR #${{ github.event.pull_request.number }} in ${{ github.repository }} (Task #${{ steps.issue.outputs.number }}) Branch: ${{ github.head_ref }}\"}"
